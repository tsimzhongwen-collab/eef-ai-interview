<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EEF AI 实时模拟面签</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <section id="interviewView" class="interview-view">
      <header class="topbar">
        <div>
          <div class="eyebrow">CAMPUS FRANCE · EEF</div>
          <h1>Entretien simulé</h1>
        </div>
        <div class="question-count" id="questionCount">00 / 20</div>
      </header>

      <section class="officer-stage" aria-label="Campus France virtual officer">
        <div class="office-bg">
          <div class="window"></div>
          <div class="shelf"></div>
          <div class="flag flag-fr"></div>
          <div class="flag flag-eu"></div>
          <div class="wall-frame"></div>
          <div class="desk-line"></div>
        </div>

        <div class="officer" id="officerAvatar" aria-hidden="true">
          <div class="head">
            <div class="hair"></div>
            <div class="hair-side hair-left"></div>
            <div class="hair-side hair-right"></div>
            <div class="ear ear-left"></div>
            <div class="ear ear-right"></div>
            <div class="face">
              <div class="forehead-shadow"></div>
              <div class="brow brow-left"></div>
              <div class="brow brow-right"></div>
              <div class="eye eye-left"><span></span><i></i></div>
              <div class="eye eye-right"><span></span><i></i></div>
              <div class="glasses">
                <div class="lens lens-left"></div>
                <div class="lens lens-right"></div>
              </div>
              <div class="nose"></div>
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
              <div class="mouth" id="mouth"></div>
              <div class="stubble"></div>
              <div class="jaw-shadow"></div>
            </div>
          </div>
          <div class="neck"></div>
          <div class="body">
            <div class="jacket"></div>
            <div class="shirt"></div>
            <div class="collar collar-left"></div>
            <div class="collar collar-right"></div>
            <div class="tie"></div>
            <div class="lapel-pin"></div>
            <div class="badge"></div>
          </div>
        </div>

        <div class="desk">
          <div class="folder folder-left"></div>
          <div class="folder folder-right"></div>
          <div class="desk-plate">Campus France</div>
        </div>
      </section>

      <section class="control-panel">
        <div class="status-block">
          <div class="status-label">État</div>
          <div class="status-value" id="statusText">Prêt pour l'entretien</div>
        </div>
        <div class="audio-meter" aria-label="audio level">
          <span id="meterA"></span>
          <span id="meterB"></span>
          <span id="meterC"></span>
        </div>
        <button id="toggleTextBtn" class="text-toggle hidden">Afficher le texte</button>
      </section>

      <p id="questionText" class="question-text hidden"></p>

      <section class="primary-actions">
        <button id="startBtn" class="start-button">Commencer l'entretien</button>
        <button id="endBtn" class="end-button hidden">结束面签</button>
      </section>
    </section>

    <section id="feedbackView" class="feedback-view hidden">
      <header class="feedback-header">
        <div class="eyebrow">BILAN EN CHINOIS</div>
        <h2>本轮复盘</h2>
      </header>
      <article id="feedbackContent" class="feedback-content">正在生成中文复盘...</article>
      <button id="restartBtn" class="start-button">重新开始一轮</button>
    </section>
  </main>

  <audio id="remoteAudio" autoplay></audio>
  <script src="/questions.js"></script>
  <script src="/app.js"></script>
</body>
</html>
