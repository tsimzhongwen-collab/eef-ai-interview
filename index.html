<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EEF AI 实时模拟面签</title>
  <link rel="stylesheet" href="/style.css">
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
  }
}
</script>
</head>
<body>
  <main class="app-shell">
    <section id="interviewView" class="interview-view">
      <header class="topbar">
        <div class="topbar-left">
          <details id="modePicker" class="mode-picker">
            <summary>
              <span class="mode-kicker">Mode</span>
              <strong id="practiceModeLabel">五部分随机</strong>
            </summary>
            <div class="mode-menu" id="practiceModeOptions">
              <button type="button" data-mode="part-1">第 1 部分顺序提问</button>
              <button type="button" data-mode="part-2">第 2 部分顺序提问</button>
              <button type="button" data-mode="part-3">第 3 部分顺序提问</button>
              <button type="button" data-mode="part-4">第 4 部分顺序提问</button>
              <button type="button" data-mode="part-5">第 5 部分顺序提问</button>
              <button type="button" data-mode="random-5">五部分随机抽选</button>
            </div>
          </details>
          <div>
            <div class="eyebrow">CAMPUS FRANCE · EEF</div>
            <h1>Entretien simulé</h1>
          </div>
        </div>
        <div class="question-count" id="questionCount">00 / 20</div>
      </header>

      <section class="officer-stage" aria-label="Campus France virtual officer">
        <div class="office-bg">
          <div class="window"></div>
          <div class="shelf"></div>
          <div class="flag flag-fr"></div>
          <div class="flag flag-eu"></div>
          <div class="wall-frame"></div>
          <div class="desk-line"></div>
        </div>

        <div class="officer" id="officerAvatar" aria-hidden="true">
          <div id="avatarMount" class="avatar-mount"></div>
          <div id="mouth" class="hidden-mouth"></div>
        </div>

        <div class="desk">
          <div class="folder folder-left"></div>
          <div class="folder folder-right"></div>
          <div class="desk-plate">Campus France</div>
        </div>
      </section>

      <section class="control-panel">
        <div class="status-block">
          <div class="status-label">État</div>
          <div class="status-value" id="statusText">Prêt pour l'entretien</div>
        </div>
        <div class="audio-meter" aria-label="audio level">
          <span id="meterA"></span>
          <span id="meterB"></span>
          <span id="meterC"></span>
        </div>
        <button id="toggleTextBtn" class="text-toggle hidden">Afficher le texte</button>
      </section>

      <p id="questionText" class="question-text hidden"></p>

      <section class="primary-actions">
        <button id="startBtn" class="start-button">Commencer l'entretien</button>
        <button id="endBtn" class="end-button hidden">结束面签</button>
      </section>
    </section>

    <section id="feedbackView" class="feedback-view hidden">
      <header class="feedback-header">
        <div class="eyebrow">BILAN EN CHINOIS</div>
        <h2>本轮复盘</h2>
      </header>
      <article id="feedbackContent" class="feedback-content">正在生成中文复盘...</article>
      <button id="restartBtn" class="start-button">重新开始一轮</button>
    </section>
  </main>

  <audio id="remoteAudio" autoplay></audio>
  <script src="/questions.js"></script>
  <script type="module" src="/avatar-controller.js"></script>
  <script src="/app.js"></script>
</body>
</html>
